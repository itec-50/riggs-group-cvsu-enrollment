<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cvsu Bacoor - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Times New Roman', Times, serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; background-image: linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.45)), url("laya-at-diwa-scaled.jpg"); background-size: cover; background-position: center; background-attachment: fixed; padding: 20px; }
        .container-box { background-color: rgba(255, 255, 255, 0.88); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); padding: 30px 20px; width: 100%; max-width: 420px; text-align: center; border-radius: 12px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.3); }
        .header img { display: block; margin: 0 auto 15px auto; max-width: 130px; height: auto; }
        h1 { margin-bottom: 8px; color: #1b4d1c; font-family: Georgia, serif; font-size: clamp(1.4rem, 4vw, 1.8rem); line-height: 1.2; }
        .header p { font-size: 0.9rem; color: #555; margin-bottom: 15px; }
        form input { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid rgb(46, 179, 75); border-radius: 6px; font-size: 1rem; outline: none; }
        button { width: 100%; max-width: 160px; padding: 12px; background: #1b4d1c; color: white; border: none; border-radius: 6px; margin: 15px auto 5px auto; font-size: 1rem; font-weight: bold; font-style: italic; cursor: pointer; display: block; }
        p.register-redirect { margin-top: 15px; font-size: 0.95rem; color: #444; }
        p.register-redirect a { color: rgb(196, 21, 21); text-decoration: underline; font-weight: bold; }
        @media (min-width: 768px) { .container-box { padding: 45px 35px; } }
    </style>
</head>
<body>
    <div class="container-box">
        <div class="header">
            <img src="alliance.png" alt="Cvsu logo">
            <h1>Cvsu-Bacoor Campus Enrollment</h1>
            <p>Complete your enrollment process securely</p>
        </div>
        <form onsubmit="handleLogin(event);">
            <input type="text" id="username" placeholder="Email/Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <p class="register-redirect">Don't have an account?? <a href="register.html">Register</a></p>
    </div>
    <script>
        const CLOUD_URL = "https://riggs-enrollment.up.railway.app";

        function setCookie(name, value, days) {
            let expires = "";
            if (days) {
                let date = new Date();
                date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
                expires = "; expires=" + date.toUTCString();
            }
            document.cookie = name + "=" + encodeURIComponent(value) + expires + "; path=/; SameSite=Strict";
        }

        async function handleLogin(event) {
            event.preventDefault();            
            let usernameInput = document.getElementById("username").value.trim();
            let passwordInput = document.getElementById("password").value;

            if (usernameInput === "admin@cvsu.edu" && passwordInput === "admin123") {
                setCookie("userRole", "admin", 90);
                setCookie("userName", "Registrar Admin System", 90);
                alert("Administrative Console Access Granted.");
                window.location.href = "admin.html";
                return;
            }

            try {
                const response = await fetch(`${CLOUD_URL}/api/auth/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username: usernameInput, password: passwordInput })
                });
                const result = await response.json();
                if (response.ok && result.success) {
                    setCookie("userRole", "student", 90);
                    setCookie("userName", result.fullName, 90);
                    setCookie("userEmail", result.email, 90);
                    alert("Welcome back, " + result.fullName + "!");
                    window.location.href = "student-portal.html";
                } else {
                    alert(result.error || "Authentication mismatch.");
                }
            } catch (error) {
                alert("Authentication node unreachable. Ensure dynamic pipeline router is running.");
            }
        }
    </script>
</body>
</html>
